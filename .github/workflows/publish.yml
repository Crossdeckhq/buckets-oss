name: Publish to npm

# Publishes @cross-deck/buckets via npm TRUSTED PUBLISHING (OIDC) — the same way
# @cross-deck/web, /node, /cli, /react-native already publish ("GitHub Actions" as
# the publisher on npm). There is NO token: GitHub mints a short-lived OIDC identity,
# npm verifies it against the trusted-publisher you connect on the package, and the
# publish proceeds with provenance. No long-lived secret, nothing to expire, no
# 2FA / passkey prompt.
#
# ONE-TIME SETUP (on npmjs.com, the same as the other @cross-deck packages):
#   package @cross-deck/buckets → Settings → Trusted Publisher → GitHub Actions →
#     Organization or user:  Crossdeckhq
#     Repository:            buckets-oss
#     Workflow filename:     publish.yml
#   (leave Environment blank)
#
# Then: cut a GitHub Release (tag v0.1.0) → this runs → npm publish.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC — this is the credential; no token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      # Trusted publishing requires a recent npm (>= 11.5.1); Node 20 ships npm 10.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public --provenance
