name: Publish to npm

# Publishes @cross-deck/buckets when you cut a GitHub Release. The "cross-deck"
# npm org is already owned (it ships @cross-deck/web, /node, /cli, /react-native),
# so the ONLY setup this repo needs is an NPM_TOKEN secret (an npm automation token
# with publish rights to the cross-deck org). Cut a release → this builds, tests,
# and publishes with provenance. No token ever leaves CI.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
